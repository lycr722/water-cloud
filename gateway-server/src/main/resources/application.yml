server:
  port: 9527

spring:
  redis:
    host: 127.0.0.1
    port: 6379
  application:
    name: gateway-server
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true    # 开启从注册中心动态创建路由
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "GET,POST,DELETE,PUT"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      default-encoding: UTF-8

      routes:
        - id: user
          uri: lb://user-server
          predicates:
            - Path=/user/**

        - id: order
            uri: lb://order-server
            #          uri: lb://order-server
            predicates:
              - Path=/order/**

        - id: building
          uri: lb://building-server
          predicates:
            - Path=/building/**

        - id: worker
          uri: lb://worker-server
          predicates:
            - Path=/worker/**

    nacos:
      discovery:
        server-addr: localhost:80
        cluster-name: KM
        namespace: feeae11e-87c6-4509-8e77-68dc3ba1bb61

gateway:
  auth:
    ignore-paths:
      - /user/check
      - /user/register
      - /user/getOpenId
      - /swagger-ui
      - /v3/api-docs
      - /actuator

redisson:
  address: redis://127.0.0.1:6379

